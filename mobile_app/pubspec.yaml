name: mobile_app
description: "Campus Fix - Platform Manajemen Pelaporan Fasilitas Telkom University"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  geolocator: ^13.0.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
